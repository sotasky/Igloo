name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      summary:
        description: Release summary
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Require main
        run: test "$GITHUB_REF" = "refs/heads/main"

      - name: Install media tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "26"

      - name: Test release helper
        run: node --test scripts/dev/release.test.mjs

      - name: Prepare release
        id: release
        env:
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_SUMMARY: ${{ inputs.summary }}
        run: .github/scripts/prepare-release.sh "${INPUT_BUMP:-patch}" release-notes.md "$INPUT_SUMMARY"

      - name: Run full release gate
        run: scripts/dev/test-full.sh

      - name: Commit and tag signed release
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
          RELEASE_GIT_USER_NAME: ${{ vars.RELEASE_GIT_USER_NAME }}
          RELEASE_GIT_USER_EMAIL: ${{ vars.RELEASE_GIT_USER_EMAIL }}
        run: |
          test -n "$RELEASE_GPG_PRIVATE_KEY"
          test -n "$RELEASE_GPG_PASSPHRASE"
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$RELEASE_GPG_PRIVATE_KEY" > "$RUNNER_TEMP/release-signing-key.asc"
          gpg --batch --import "$RUNNER_TEMP/release-signing-key.asc"
          fingerprint="$(gpg --batch --list-secret-keys --with-colons | awk -F: '$1 == "fpr" { print $10; exit }')"
          test -n "$fingerprint"
          cat > "$RUNNER_TEMP/gpg-wrapper" <<'EOF'
          #!/usr/bin/env bash
          exec gpg --batch --yes --pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE" "$@"
          EOF
          chmod 700 "$RUNNER_TEMP/gpg-wrapper"
          git config user.name "${RELEASE_GIT_USER_NAME:-github-actions[bot]}"
          git config user.email "${RELEASE_GIT_USER_EMAIL:-41898282+github-actions[bot]@users.noreply.github.com}"
          git config user.signingkey "$fingerprint"
          git config gpg.program "$RUNNER_TEMP/gpg-wrapper"
          git add android/app/build.gradle.kts
          git diff --cached --quiet && exit 1
          git commit -S -m "release ${{ steps.release.outputs.version }}"
          git tag -s "${{ steps.release.outputs.tag }}" -m "release ${{ steps.release.outputs.version }}"

      - name: Push release commit and tag
        run: git push --atomic origin HEAD:main "refs/tags/${{ steps.release.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.release.outputs.tag }}" --title "${{ steps.release.outputs.tag }}" --notes-file release-notes.md --verify-tag

      - name: Build release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run container-release.yml --ref "${{ steps.release.outputs.tag }}"
          gh workflow run android-release.yml --ref "${{ steps.release.outputs.tag }}"
