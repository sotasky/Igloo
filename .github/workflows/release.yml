name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        github.actor != 'github-actions[bot]' &&
        !startsWith(github.event.head_commit.message, 'release ') &&
        !contains(github.event.head_commit.message, 'release: none')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require main
        run: test "$GITHUB_REF" = "refs/heads/main"

      - name: Test release helper
        run: node --test scripts/dev/release.test.mjs

      - name: Prepare release
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUMP: ${{ inputs.bump }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            node scripts/dev/release.mjs prepare "${INPUT_BUMP:-patch}" --notes release-notes.md
          else
            node scripts/dev/release.mjs prepare-auto --threshold 20 --bump-file .github/release-bump --notes release-notes.md
          fi

      - name: Commit and tag release
        if: steps.release.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json android/app/build.gradle.kts .github/release-bump
          git diff --cached --quiet && exit 1
          git commit -m "release ${{ steps.release.outputs.version }}"
          git tag -a "${{ steps.release.outputs.tag }}" -m "release ${{ steps.release.outputs.version }}"

      - name: Push release commit and tag
        if: steps.release.outputs.should_release == 'true'
        run: git push --atomic origin HEAD:main "refs/tags/${{ steps.release.outputs.tag }}"

      - name: Create GitHub release
        if: steps.release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.release.outputs.tag }}" --title "${{ steps.release.outputs.tag }}" --notes-file release-notes.md --verify-tag

      - name: Build release artifacts
        if: steps.release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run container-release.yml --ref "${{ steps.release.outputs.tag }}"
          gh workflow run android-release.yml --ref "${{ steps.release.outputs.tag }}"
          gh workflow run codeql.yml --ref "${{ steps.release.outputs.tag }}"
