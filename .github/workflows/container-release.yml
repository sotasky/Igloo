name: Container Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  attestations: write
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: DeterminateSystems/determinate-nix-action@bafaa638b9d5ec0e7e3ac1a7fc80453ef1fd265f # v3

      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # main
        with:
          use-flakehub: false

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.0.6

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/igloo
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build Nix container image
        run: nix build .#container --print-build-logs

      - name: Load Nix container image
        run: docker load < result

      - name: Push container image
        id: build
        env:
          SOURCE_IMAGE: ghcr.io/screwys/igloo:latest
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first_tag="$(printf '%s\n' "$TAGS" | head -n1)"
          while IFS= read -r tag; do
            test -n "$tag" || continue
            docker tag "$SOURCE_IMAGE" "$tag"
            docker push "$tag"
          done <<EOF
          $TAGS
          EOF
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$first_tag" | sed 's/.*@//')"
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Prepare security artifact directory
        run: mkdir -p release-artifacts

      - name: Generate container SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ghcr.io/${{ github.repository_owner }}/igloo@${{ steps.build.outputs.digest }}
          artifact-name: igloo-container-sbom.spdx.json
          output-file: release-artifacts/igloo-container-${{ github.ref_name }}.spdx.json
          upload-release-assets: false

      - name: Scan container SBOM
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: release-artifacts/igloo-container-${{ github.ref_name }}.spdx.json
          fail-build: true
          severity-cutoff: critical
          only-fixed: true
          output-format: json
          output-file: release-artifacts/igloo-container-${{ github.ref_name }}-vulnerabilities.json

      - name: Sign container image keyless
        env:
          IMAGE_DIGEST: ghcr.io/${{ github.repository_owner }}/igloo@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_DIGEST"

      - name: Sign container image with release key
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          IMAGE_DIGEST: ghcr.io/${{ github.repository_owner }}/igloo@${{ steps.build.outputs.digest }}
        run: |
          test -n "$COSIGN_PRIVATE_KEY"
          test -n "$COSIGN_PASSWORD"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$IMAGE_DIGEST"

      - name: Generate container attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/igloo
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attach container security artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: release-artifacts/*
