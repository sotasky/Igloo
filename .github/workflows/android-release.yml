name: Android Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:testDevtestUnitTest :app:assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: igloo-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Prepare release APK asset
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release-artifacts
          apk="$(find android/app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n1)"
          test -n "$apk"
          cp "$apk" "release-artifacts/igloo-android-${GITHUB_REF_NAME}.apk"

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*.apk
