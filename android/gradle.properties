# Project-wide Gradle settings.
org.gradle.daemon=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Public/release APKs should not point at one developer LAN by default. When this
# is blank, Android falls back to the generic LAN starter http://igloo.local:5001.
# Set this locally or in CI when you intentionally want a different pre-filled URL.
DEFAULT_SERVER_URL=
